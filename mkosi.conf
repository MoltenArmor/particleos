[Build]
History=yes
CacheDirectory=mkosi.cache
Incremental=yes

[Output]
OutputDirectory=mkosi.output
SplitArtifacts=no
Format=disk
ImageId=ParticleOS

[Content]
UnifiedKernelImageFormat=%i_%v
KernelCommandLine=rw mount.usr=PARTLABEL=%i_%v systemd.ssh_auto=no
InitrdPackages=
        less
        btrfs-progs
        gzip

Packages=
        acl
        attr
        bash-completion
        binutils
        coreutils
        cpio
        curl
        dbus-broker
        diffutils
        distribution-gpg-keys
        doas
        dosfstools
        e2fsprogs
        erofs-utils
        findutils
        grep
        gzip
        jq
        kbd
        kmod
        less
        man
        nano
        nftables
        openssl
        polkitd
        sed
        strace
        systemd
        tar
        tree
        tzdata
        udev
        util-linux
        which
        xfsprogs
        zstd

[Validation]
SecureBoot=no
SignExpectedPcr=no
SecureBootAutoEnroll=no

[Host]
RuntimeSize=30G
QemuMem=4G
QemuSmp=4
QemuArgs=-full-screen
Ephemeral=yes
RuntimeScratch=no
QemuSwtpm=no
